function PreviewIVRKeypad({ validKeys, keyLabels }) {
  const keys = ["1","2","3","4","5","6","7","8","9","*","0","#"];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginTop: 12 }}>
      {keys.map(k => {
        const isValid = validKeys.includes(k);
        const label = keyLabels?.[k];
        const isDecline = label === "Decline";
        return (
          <div key={k} style={{
            display: "flex", flexDirection: "column", alignItems: "center", padding: "10px 0",
            borderRadius: "var(--radius-md)",
            border: isValid
              ? "1.5px solid " + (isDecline ? "var(--lyra-color-status-critical-medium)" : "var(--lyra-color-status-success-medium)")
              : "1px solid var(--lyra-color-border-subtle)",
            background: isValid
              ? (isDecline ? "var(--lyra-color-status-critical-subtle)" : "var(--lyra-color-status-success-subtle)")
              : "var(--lyra-color-bg-surface-base)",
          }}>
            <span style={{ font: "600 16px/20px var(--font-sans)", color: isValid ? (isDecline ? "var(--lyra-color-status-critical-strong)" : "var(--lyra-color-status-success-strong)") : "var(--lyra-color-fg-disabled)" }}>{k}</span>
            {label && <span style={{ font: "400 10px/13px var(--font-sans)", color: isValid ? (isDecline ? "var(--lyra-color-status-critical-strong)" : "var(--lyra-color-status-success-strong)") : "var(--lyra-color-fg-disabled)", marginTop: 2 }}>{label}</span>}
          </div>
        );
      })}
    </div>
  );
}

function PreviewIVRScaleKeypad({ q }) {
  const labels = PREVIEW_SCALE_DEFAULTS.map((def, i) => (q.scaleLabels?.[i] || "").trim() || def);
  const keys = ["1","2","3","4","5","6","7","8","9","*","0","#"];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginTop: 12 }}>
      {keys.map(k => {
        const idx = parseInt(k, 10) - 1;
        const isScale = idx >= 0 && idx <= 4;
        const sc = isScale ? PREVIEW_SCALE_COLORS[idx] : null;
        return (
          <div key={k} style={{
            display: "flex", flexDirection: "column", alignItems: "center", padding: "8px 0",
            borderRadius: "var(--radius-md)",
            border: isScale
              ? "1.5px solid " + (idx === 0 ? "var(--lyra-color-status-critical-medium)" : idx === 4 ? "var(--lyra-color-status-success-medium)" : "var(--lyra-color-border-soft)")
              : "1px solid var(--lyra-color-border-subtle)",
            background: isScale ? sc.bg : "var(--lyra-color-bg-surface-base)",
          }}>
            <span style={{ font: "600 15px/20px var(--font-sans)", color: isScale ? sc.color : "var(--lyra-color-fg-disabled)" }}>{k}</span>
            {isScale && <span style={{ font: "400 9px/12px var(--font-sans)", color: sc.color, marginTop: 2, textAlign: "center", padding: "0 3px" }}>{labels[idx]}</span>}
          </div>
        );
      })}
    </div>
  );
}

function FullSurveyPreviewModal({ d, onClose }) {
  const [previewTab, setPreviewTab] = React.useState("digital-standard");
  const [stepIdx, setStepIdx] = React.useState(0);
  const [displayStyle, setDisplayStyle] = React.useState("Quick Reply");

  const standardQs = (d.selectedQuestions || []).map((q, i) => ({
    num: i + 1,
    kind: q.type === "1-5 Scale" ? "scale"
      : q.type === "0-10 Scale" ? "scale10"
      : q.type === "Yes / No" ? "yesno"
      : q.type === "Single Select" ? "singleselect"
      : "freetext",
    text: q.text,
    scaleLabels: q.scaleLabels || [],
    yesNoLabels: q.yesNoLabels || ["Yes", "No"],
    singleSelectOptions: q.singleSelectOptions || ["Option 1", "Option 2", "Option 3"],
  }));

  const aiQs = d.aiQuestions
    ? [
        ...(d.defaultScaleQuestion
          ? [{ num: 1, kind: "scale", text: d.defaultScaleQuestion, scaleLabels: [], isAI: true }]
          : [{ num: 1, kind: "scale", text: "How would you rate your overall experience?", scaleLabels: [], isAI: true }]
        ),
        ...(d.defaultCommentQuestion
          ? [{ num: 2, kind: "freetext", text: d.defaultCommentQuestion, isAI: true }]
          : []
        ),
      ]
    : [
        { num: 1, kind: "scale", text: "How would you rate your overall experience?", scaleLabels: [], isAI: true },
        { num: 2, kind: "freetext", text: "Is there anything else you'd like to share?", isAI: true },
      ];

  const stepMap = {
    "digital-standard": [{ kind: "welcome" }, ...standardQs, { kind: "done" }],
    "ivr-standard":     [{ kind: "ivr-welcome" }, ...standardQs, { kind: "done" }],
    "digital-ai":       [{ kind: "welcome" }, ...aiQs, { kind: "done" }],
  };

  const currentSteps = stepMap[previewTab] || [];
  const safeIdx = Math.min(stepIdx, currentSteps.length - 1);
  const step = currentSteps[safeIdx] || {};

  const handleTabChange = (tabId) => { setPreviewTab(tabId); setStepIdx(0); };
  const goNext = () => setStepIdx(i => Math.min(i + 1, currentSteps.length - 1));
  const goBack = () => setStepIdx(i => Math.max(i - 1, 0));

  const isIVRTab = previewTab === "ivr-standard";
  const isAITab  = previewTab === "digital-ai";
  const isScaleStep = step.kind === "scale" || step.kind === "scale10";

  // ── Digital step renderer
  const renderDigitalStep = () => {
    if (step.kind === "welcome") {
      const msg = d.welcomeMessage || "We’d love to hear about your experience today. This will only take a minute.";
      return (
        <div>
          <PreviewBotBubble text={msg} isAI={false} />
          {(d.welcomeMode || "with-optout") !== "none" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 4 }}>
              <div style={{ padding: "8px 16px", borderRadius: "var(--radius-full)", border: "1.5px solid var(--lyra-color-bg-primary)", font: "500 13px/18px var(--font-sans)", color: "var(--lyra-color-fg-active-strong)", textAlign: "center" }}>
                Start Survey
              </div>
              {d.welcomeMode === "with-optout" && (
                <div style={{ padding: "8px 16px", borderRadius: "var(--radius-full)", border: "1.5px solid var(--lyra-color-border-soft)", font: "400 13px/18px var(--font-sans)", color: "var(--lyra-color-fg-secondary)", textAlign: "center" }}>
                  No thanks
                </div>
              )}
            </div>
          )}
        </div>
      );
    }
    if (step.kind === "done") {
      return <PreviewBotBubble text="Thank you for completing the survey! Your feedback means a lot to us." isAI={false} />;
    }
    const q = step;
    return (
      <div>
        <PreviewBotBubble text={q.text} isAI={q.isAI || false} />
        {(q.kind === "scale" || q.kind === "scale10") && (
          displayStyle === "List Picker" ? <PreviewScaleList q={q} /> : <PreviewScaleChips q={q} />
        )}
        {q.kind === "yesno" && (
          <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
            {(q.yesNoLabels || ["Yes", "No"]).map((label, i) => (
              <div key={i} style={{ flex: 1, padding: "8px", borderRadius: "var(--radius-full)", border: "1.5px solid var(--lyra-color-border-soft)", font: "500 13px/18px var(--font-sans)", color: "var(--lyra-color-fg-default)", textAlign: "center" }}>
                {label}
              </div>
            ))}
          </div>
        )}
        {q.kind === "singleselect" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 4 }}>
            {(q.singleSelectOptions || ["Option 1", "Option 2"]).map((opt, i) => (
              <div key={i} style={{ padding: "8px 12px", borderRadius: "var(--radius-md)", border: "1.5px solid var(--lyra-color-border-soft)", font: "400 13px/18px var(--font-sans)", color: "var(--lyra-color-fg-default)" }}>
                {opt}
              </div>
            ))}
          </div>
        )}
        {q.kind === "freetext" && (
          <div style={{ marginTop: 4 }}>
            <div style={{ background: "var(--lyra-color-bg-field)", border: "1px solid var(--lyra-color-border-soft)", borderRadius: "var(--radius-md)", padding: "8px 12px", font: "400 13px/18px var(--font-sans)", color: "var(--lyra-color-fg-disabled)", minHeight: 52 }}>
              Type your response here…
            </div>
            <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 6 }}>
              <div style={{ padding: "6px 14px", background: "var(--lyra-color-bg-primary)", borderRadius: "var(--radius-full)", font: "500 12px/16px var(--font-sans)", color: "var(--lyra-color-fg-inverse)" }}>
                Send
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ── IVR step renderer
  const renderIVRStep = () => {
    if (step.kind === "ivr-welcome") {
      const msg = d.welcomeMessage || "We’d love to hear about your experience today.";
      const hasOptOut = (d.ivrWelcomeMode || d.welcomeMode || "with-optout") === "with-optout";
      return (
        <div>
          <div style={{ background: "var(--lyra-color-bg-surface-base)", borderRadius: "var(--radius-md)", padding: "var(--space-3)", boxShadow: "var(--sol-effect-shadowsm)", marginBottom: "var(--space-3)" }}>

function KebabMenu() {
  const [open, setOpen] = React.useState(false);

    if (!open) return;

    return () => document.removeEventListener("mousedown", onDown);

  const actions = [

  return (

            onMouseEnter={e => e.currentTarget.style.background = "rgba(0,0,0,0.04)"}
            onMouseLeave={e => e.currentTarget.style.background = "none"}>
              <span style={{ color: "var(--color-fg-secondary)" }}>{a.icon}</span>
              {a.label}
            </button>
          ))}
        </div>

    </div>
  );
}

    setC({ ...c, hasWorkingCopy: false, publishedVersion: c.workingCopyVersion, publishedAt: "May 13, 2026" });

    if (!window.confirm("Discard all unpublished changes? The campaign will return to v" + c.publishedVersion + ".")) return;
    setC({ ...c, hasWorkingCopy: false });
    setToast({ msg: `Working copy discarded. v${c.publishedVersion} remains active.` });
  };

  return (
    <div className="pane" style={{ overflow: "hidden" }}>
      <div className="crumbs">
        <a href="#" onClick={e => { e.preventDefault(); onBack(); }}>Survey Campaigns</a>

        <span className="last">{c.name}</span>

      {/* Page header — title only */}

        <h1 style={{ flex: 1, margin: 0 }}>{c.name}</h1>

      {/* Scrollable body — meta row + banner + detail layout */}

      <div style={{
        display: "flex", alignItems: "center", gap: "var(--space-3)",

          fontFamily: "var(--font-sans)",

          <strong style={{ color: "var(--color-fg-default)", fontWeight: 500 }}>Owner:</strong> {c.owner}
          <span style={{ margin: "0 var(--space-2)" }}>•</span>
          <strong style={{ color: "var(--color-fg-default)", fontWeight: 500 }}>Created:</strong> {c.created}
          <span style={{ margin: "0 var(--space-2)" }}>•</span>
          <strong style={{ color: "var(--color-fg-default)", fontWeight: 500 }}>Last Updated:</strong> {c.updated}
          {c.status !== "expired" && (
            <>
              <span style={{ margin: "0 var(--space-2)" }}>•</span>
              <CampaignStateInline status={c.status} hasWorkingCopy={c.hasWorkingCopy}/>

          )}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "var(--space-3)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "var(--space-2)" }}>
            <span style={{ font: "500 12px/16px var(--font-sans)", color: "var(--color-fg-secondary)" }}>Campaign Status</span>
            <StatusPill s={c.status}/>
          </div>

      </div>

      {c.hasWorkingCopy ? (
        <div className="working-banner" style={{ margin: "0 var(--space-8) var(--space-4)" }}>
          <div className="working-banner-ico">

              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
            </svg>
          </div>
          <div className="working-banner-body">
            <div className="working-banner-title">This campaign has unpublished changes</div>

      {/* View Changes modal */}
      {showChanges && ReactDOM.createPortal(
        <div style={{ position: "fixed", inset: 0, zIndex: 800, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.40)" }}

                <div style={{ font: "600 16px/24px var(--font-sans)", color: "var(--color-fg-default)", letterSpacing: "-0.01rem" }}>What's changed in v{c.workingCopyVersion}</div>

              <button onClick={() => setShowChanges(false)} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, color: "var(--color-fg-secondary)", display: "flex", alignItems: "center", borderRadius: "var(--radius-sm)" }}>
                <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
              </button>
            </div>
            {/* Change list */}
            <div style={{ overflowY: "auto", padding: "var(--space-4) var(--space-6)", display: "flex", flexDirection: "column", gap: "var(--space-2)" }}>
              {[
                { section: "Volume & Sampling", field: "Sampling Rate", from: "50%", to: "65%" },
                { section: "Suppression Rules", field: "Recency Window", from: "30 days", to: "14 days" },
                { section: "Topic AI Model & Survey Template", field: "Survey Template", from: "Post-Chat CSAT", to: "NPS Pulse Survey" },
                { section: "Campaign Identity & Scope", field: "Active Date Range", from: "2026-05-12 — 2026-12-31", to: "2026-05-12 — Ongoing" },
              ].map((row, i) => (

                  <div style={{ display: "flex", alignItems: "center", gap: "var(--space-3)", flexWrap: "wrap" }}>
                    <span style={{ display: "inline-flex", alignItems: "center", gap: "var(--space-1)", padding: "2px var(--space-2)", background: "#fff0f0", border: "1px solid rgba(191,35,35,0.20)", borderRadius: "var(--radius-xs)", font: "400 13px/18px var(--font-sans)", color: "var(--lyra-red-600, #bf2323)", textDecoration: "line-through" }}>
                      {row.from}
                    </span>
                    <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="var(--color-fg-secondary)" strokeWidth="1.5" strokeLinecap="round"><line x1="2" y1="8" x2="14" y2="8"/><polyline points="10 4 14 8 10 12"/></svg>
                    <span style={{ display: "inline-flex", alignItems: "center", gap: "var(--space-1)", padding: "2px var(--space-2)", background: "var(--lyra-green-50)", border: "1px solid rgba(28,94,37,0.20)", borderRadius: "var(--radius-xs)", font: "400 13px/18px var(--font-sans)", color: "var(--lyra-green-700)" }}>
                      {row.to}
                    </span>
                  </div>
                </div>
              ))}
            </div>
            {/* Footer */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: "var(--space-2)", padding: "var(--space-4) var(--space-6)", borderTop: "1px solid var(--color-border-subtle)" }}>
              <button className="btn" onClick={() => setShowChanges(false)}>Close</button>
              <button className="btn primary" onClick={() => { setShowChanges(false); publishWorkingCopy(); }}>
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 13 10 19 20 5"/></svg>
                Publish V{c.workingCopyVersion}
              </button>
            </div>
          </div>
        </div>,
        document.body
      )}

      <div className="detail-layout" style={{ flex: 1 }}>
        <div className="detail-main">
          <ConfigurationView campaign={c}/>
        </div>
        <aside className="detail-sidebar">
          <CampaignSummaryCard campaign={c}/>
        </aside>
      </div>

      </div>{/* /scrollable body */}

      {/* Bottom action bar */}
      <div className="wz-footer">
        <button className="btn" onClick={onBack}>← Back</button>

      {toast ? (
        <div className="toast">
          <div className="toast-icon">
            <svg viewBox="0 0 16 16"><polyline points="3 8.5 6.5 12 13 5"/></svg>

          <span className="toast-msg">{toast.msg}</span>
          <button className="toast-close" onClick={() => setToast(null)} aria-label="Dismiss">
            <svg viewBox="0 0 16 16"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
          </button>
        </div>
      ) : null}
    </div>
  );
}

/* Campaign Summary sidebar card */
function CampaignSummaryCard({ campaign: c }) {
  /* ── Config info ── */
  const sh = c.startTime ? parseInt(c.startTime) : null;
  const eh = c.endTime ? parseInt(c.endTime) : null;
  const surveyHoursValue = (() => {
    if (c.allDay) return { isHours: true, startTime: "00:00", endTime: "23:59", startHour: 0, endHour: 23, duration: "23 hr 59 min" };
    if (!c.startTime || !c.endTime) return { main: c.startTime || "Not set" };
    const totalMins = (sh * 60 + parseInt(c.startTime.split(":")[1]));
    const endMins = (eh * 60 + parseInt(c.endTime.split(":")[1]));
    const diff = endMins - totalMins;
    const hrs = Math.floor(diff / 60), mins = diff % 60;
    const duration = diff > 0 ? (hrs > 0 && mins > 0 ? `${hrs} hr ${mins} min` : hrs > 0 ? `${hrs} hr` : `${mins} min`) : null;
    return { isHours: true, startTime: c.startTime, endTime: c.endTime, startHour: sh, endHour: eh, duration };
  })();
  const surveyDays = c.surveyDays?.length ? c.surveyDays.map(d => DAY_LABELS[d]).join(", ") : "Not set";
  const dateRange = c.startDate
    ? (c.ongoing ? `Ongoing from ${c.startDate}` : c.endDate ? `${c.startDate} — ${c.endDate}` : `${c.startDate} — No end date`)
    : c.endDate ? `${c.created} — ${c.endDate}` : `Ongoing from ${c.created}`;
  const survey = (window.SEED_DESIGNS || SURVEY_DESIGNS)?.find(s => s.id === c.surveyDesignId);
  const surveyTemplate = survey ? survey.name : "Not set";

  const configRows = [
    {
      icon: <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><rect x="2" y="3" width="12" height="11" rx="1.5"/><line x1="5" y1="1.5" x2="5" y2="4.5"/><line x1="11" y1="1.5" x2="11" y2="4.5"/><line x1="2" y1="7" x2="14" y2="7"/></svg>,
      label: "Active Date Range", value: dateRange,
    },
    {
      icon: <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="6"/><polyline points="8 5 8 8 10.5 10"/></svg>,
      label: "Survey Hours", value: surveyHoursValue,
    },
    {
      icon: <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><rect x="2" y="3" width="12" height="11" rx="1.5"/><line x1="5" y1="1.5" x2="5" y2="4.5"/><line x1="11" y1="1.5" x2="11" y2="4.5"/><line x1="2" y1="7" x2="14" y2="7"/><line x1="5" y1="10" x2="5" y2="10"/><line x1="8" y1="10" x2="8" y2="10"/><line x1="11" y1="10" x2="11" y2="10"/></svg>,
      label: "Surveying Days", value: surveyDays,
    },
    {
      icon: <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><rect x="3" y="1.5" width="10" height="13" rx="1.5"/><line x1="6" y1="5" x2="10" y2="5"/><line x1="6" y1="8" x2="10" y2="8"/><line x1="6" y1="11" x2="8.5" y2="11"/></svg>,
      label: "Survey Template", value: surveyTemplate,
    },
  ];

  const rows = configRows;

  return (
    <div className="summary-card">
      <div className="summary-card-head">Campaign Summary</div>
      <div className="summary-card-rows">
        {rows.map(r => (
          <div key={r.label} className="summary-card-row">
            <div className="summary-card-icon">{r.icon}</div>
            <div className="summary-card-row-body">
              <div className="summary-card-label">{r.label}</div>
              {r.value?.isHours ? (
                <>
                  <div className="summary-card-value" style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "nowrap", whiteSpace: "nowrap" }}>
                    <span>{r.value.startTime}</span>
                    <TodDot hour={r.value.startHour} /><span style={{ font: "400 13px/18px var(--font-sans)", color: "var(--lyra-color-fg-secondary)" }}>{TOD_LABEL(r.value.startHour)}</span>
                    <svg viewBox="0 0 16 6" width="16" height="6" fill="none" style={{ flexShrink: 0, color: "var(--lyra-color-fg-disabled)" }}><path d="M0 3h14M11 1l3 2-3 2" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <span>{r.value.endTime}</span>
                    <TodDot hour={r.value.endHour} /><span style={{ font: "400 13px/18px var(--font-sans)", color: "var(--lyra-color-fg-secondary)" }}>{TOD_LABEL(r.value.endHour)}</span>
                  </div>
                  {r.value.duration && (
                    <div style={{ marginTop: 2 }}>
                      <span style={{ display: "inline-block", padding: "2px 8px", background: "var(--lyra-color-bg-active-subtle)", color: "var(--lyra-color-fg-active-strong)", borderRadius: "var(--radius-full)", font: "500 12px/16px var(--font-sans)" }}>{r.value.duration}</span>
                    </div>
                  )}
                </>
              ) : (
                <div className="summary-card-value">{r.value?.main ?? r.value}</div>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function DefRow({ label, tooltip, children, divider }) {
  return (
    <div className="def-row" style={divider ? { paddingBottom: "var(--space-5)", borderBottom: "1px solid var(--lyra-color-border-subtle)" } : undefined}>
      <div className="def-row-label" style={{ display: "flex", alignItems: "center", gap: 5 }}>
        {label}
        {tooltip && (
          <span className="tooltip-wrap" style={{ display: "inline-flex" }}>
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{ color: "var(--color-fg-secondary)", cursor: "default", flexShrink: 0 }}>
              <circle cx="8" cy="8" r="6"/>
              <path d="M8 11v-3"/>
              <circle cx="8" cy="5.5" r=".5" fill="currentColor" stroke="none"/>
            </svg>
            <span className="tooltip-bubble" style={{ width: 240, textAlign: "left", whiteSpace: "normal" }}>{tooltip}</span>
          </span>
        )}
      </div>
      <div className="def-row-value">{children}</div>
    </div>
  );
}

/* ConfigGroup — collapsible accordion card for read-only display. */
function ConfigGroup({ title, num, children, defaultOpen = true }) {
  const [open, setOpen] = React.useState(defaultOpen);
  return (
    <section className={`cfg-group${open ? "" : " cfg-group--closed"}`}>
      <header className="cfg-group-head" onClick={() => setOpen(!open)}>
        <span className="cfg-group-num">{num}</span>
        <span className="cfg-group-title">{title}</span>
        <svg className="cfg-group-chev" viewBox="0 0 16 16">
          <path d="M3.5 6 8 10.5 12.5 6" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </header>
      {open && <div className="cfg-group-body">{children}</div>}
    </section>
  );
}

function ConfigurationView({ campaign: rawC }) {
  // Normalize fields that may not exist in seed campaigns
  const c = {
    interactionChannel: "voice",
    surveyChannel: "voice",
    surveyDays: ["Mon", "Tue", "Wed", "Thu", "Fri"],
    skills: [],
    aiAgents: [],
    aiTopics: [],
    digitalChannels: [],
    surveyDigitalChannels: "",
    allDay: false,
    ...rawC,
  };

  const dateRange = c.startDate
    ? (c.ongoing ? `Ongoing from ${c.startDate}` : c.endDate ? `${c.startDate} — ${c.endDate}` : `${c.startDate} — No end date`)
    : "Ongoing from " + c.created;

  const aiModel = AI_MODELS?.find(m => m.id === c.aiModelId);
  const survey  = (window.SEED_DESIGNS || SURVEY_DESIGNS)?.find(s => s.id === c.surveyDesignId);

  return (
    <div className="cfg-group-stack">
      {/* Step 0 mirror: Template, Identity &amp; Scope */}
      <ConfigGroup num="1" title="Campaign Identity & Scope">
        <DefRow label="Campaign Name">{c.name}</DefRow>
        {c.description && <DefRow label="Description" divider>{c.description}</DefRow>}
        <DefRow label="Active Date Range">{dateRange}</DefRow>
        <DefRow label="Survey Hours">{(() => {
          if (c.allDay) return (
            <span>
              <span style={{ fontWeight: 500 }}>All Day (24hrs)</span>
              <span style={{ display: "flex", alignItems: "center", gap: 4, font: "400 12px/16px var(--font-sans)", color: "var(--lyra-color-fg-secondary)", marginTop: 2 }}><TodLabel hour={0} /> to <TodLabel hour={23} /> · 23 hr 59 min</span>
            </span>
          );
          if (!c.startTime && !c.endTime) return <span style={{ color: "var(--color-fg-secondary)" }}>Not set</span>;
          if (!c.endTime) return <span>{c.startTime} <span style={{ color: "var(--color-fg-secondary)" }}>(end time not set)</span></span>;
          const sh = parseInt(c.startTime), eh = parseInt(c.endTime);
          return (
            <span>
              <span style={{ fontWeight: 500 }}>{c.startTime} – {c.endTime}</span>
              <span style={{ display: "flex", alignItems: "center", gap: 4, font: "400 12px/16px var(--font-sans)", color: "var(--lyra-color-fg-secondary)", marginTop: 2 }}><TodLabel hour={sh} /> to <TodLabel hour={eh} /></span>
            </span>
          );
        })()}</DefRow>
        <DefRow label="Surveying Days" divider>{c.surveyDays?.length ? c.surveyDays.map(d => DAY_LABELS[d]).join(", ") : <span style={{ color: "var(--color-fg-secondary)" }}>Not set</span>}</DefRow>
        <DefRow label="Teams">{c.queues?.length ? truncateList(c.queues) : <span style={{ color: "var(--color-fg-secondary)" }}>Not set</span>}</DefRow>
        <DefRow label="Groups">{truncateList(c.teams) || "All groups"}</DefRow>
        <DefRow label="Skills">{truncateList(c.skills) || "Any skill"}</DefRow>
        <DefRow label="Cognigy AI Agents">{truncateList(c.aiAgents) || "None included"}</DefRow>
        <DefRow label="AI Topics" divider>{truncateList(c.aiTopics) || "Any topic, intent, or action"}</DefRow>
        <DefRow label="Interaction channel">{c.interactionChannel === "digital" ? "Digital" : "Voice"}</DefRow>
        {c.interactionChannel === "digital" && (
          <DefRow label="Interaction digital channel" divider>{(c.digitalChannels || []).length ? c.digitalChannels.join(", ") : <span style={{ color: "var(--color-fg-secondary)" }}>Not set</span>}</DefRow>
        )}
        <DefRow label="Survey channel">{c.surveyChannel === "digital" ? "Digital" : "Voice"}</DefRow>
        {c.surveyChannel === "digital" && (
          <DefRow label="Survey digital channel" divider>{c.surveyDigitalChannels || <span style={{ color: "var(--color-fg-secondary)" }}>Not set</span>}</DefRow>
        )}
        <DefRow label="Language" divider>English (Default)</DefRow>
        <DefRow label="Interaction Length">Minimum {c.interactionLength ?? 2} mins</DefRow>
      </ConfigGroup>

      {/* Step 1 mirror: Suppression Rules */}
      <ConfigGroup num="2" title="Suppression Rules">
        <DefRow label="Opt-out tag" tooltip="When enabled, customers who have opted out of surveys are automatically excluded from receiving this campaign.">
          {c.suppressOptOut !== false ? "Enabled" : "Disabled"}
        </DefRow>
        <DefRow label="Recency window" tooltip="Prevents a customer from receiving this survey if they were already surveyed within the defined number of days. Reduces survey fatigue.">
          {c.suppressRecent !== false ? `Enabled · ${c.recentDays ?? 30} days` : "Disabled"}
        </DefRow>
      </ConfigGroup>


      {/* Step 2 mirror: Survey Template */}
      <ConfigGroup num="3" title="Survey Template">
        <DefRow label="Survey Template">
          {survey ? survey.name : <span style={{ color: "var(--color-fg-secondary)" }}>Not configured</span>}
        </DefRow>
      </ConfigGroup>
    </div>
  );
}

          <div style={{ flex: 1, fontFamily: "var(--font-sans)", fontSize: 14, fontWeight: 400, lineHeight: "20px", color: "var(--color-fg-secondary)" }}>
            <strong style={{ color: "var(--color-fg-default)", fontWeight: 500 }}>Owner:</strong> {d.owner}
            <span style={{ margin: "0 var(--space-2)" }}>•</span>
            <strong style={{ color: "var(--color-fg-default)", fontWeight: 500 }}>Last Updated:</strong> {d.updated}
          </div>
        </div>

        {/* Detail layout */}
        <div style={{ flex: 1, padding: "0 var(--space-8) var(--space-8)" }}>
          <div className="cfg-group-stack">

              {/* 1 — Identity */}
              <TemplateConfigGroup title="Identity" num={1}>
                <DefRow label="Template Name">{d.name}</DefRow>
                <DefRow label="Description">{d.description || <span style={{ color: "var(--color-fg-secondary)", fontStyle: "italic" }}>Not set</span>}</DefRow>
              </TemplateConfigGroup>

              {/* 2 — Survey Content */}
              <TemplateConfigGroup title="Survey Content" num={2}>

                {/* Channel */}
                <div style={{ marginBottom: "var(--space-5)" }}>
                  <div style={{ font: "500 12px/16px var(--font-sans)", color: "var(--color-fg-secondary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "var(--space-1)" }}>Channel</div>
                  <DefRow label="Survey Channel"><ChannelBadge channel={d.channel === "IVR" ? "IVR" : "Digital"}/></DefRow>
                </div>

                {/* Welcome Message */}
                <div style={{ marginTop: 32, marginBottom: "var(--space-5)" }}>
                  <div style={{ font: "500 12px/16px var(--font-sans)", color: "var(--color-fg-secondary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "var(--space-1)" }}>Welcome Message</div>
                  <DefRow label="Message Mode">{welcomeLabel[d.welcomeMode] || d.welcomeMode}</DefRow>
                  {d.welcomeMode !== "none" && d.welcomeMessage && (
                    <DefRow label="Invitation Text">{d.welcomeMessage}</DefRow>
                  )}
                  {d.welcomeMode !== "none" && (
                    <>
                      <DefRow label="Start Button Label">{d.buttonToStart}</DefRow>
                      {d.welcomeMode === "with-optout" && <DefRow label="Opt-out Button Label">{d.buttonToOptOut}</DefRow>}
                    </>
                  )}
                </div>

                {/* Question Configuration */}
                <div style={{ marginTop: 32, marginBottom: "var(--space-5)" }}>
                  <div style={{ font: "500 12px/16px var(--font-sans)", color: "var(--color-fg-secondary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "var(--space-1)" }}>Question Configuration</div>
                  <DefRow label="Questions">{d.aiQuestions ? "AI Generated" : "Standard Questionnaire"}</DefRow>
                </div>

                {/* Rating Format — only shown for AI Generated templates */}
                {d.aiQuestions ? (
                  <div style={{ marginTop: 32, marginBottom: "var(--space-5)" }}>
                    <div style={{ font: "500 12px/16px var(--font-sans)", color: "var(--color-fg-secondary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "var(--space-1)" }}>Rating Format</div>
                    <DefRow label="Display Style">{d.displayStyle}</DefRow>
                    {d.listPickerLabel && <DefRow label="List Picker Label">{d.listPickerLabel}</DefRow>}
                    <DefRow label="Rating Question">{d.defaultScaleQuestion}</DefRow>
                    {d.defaultCommentQuestion && <DefRow label="Follow-up Question">{d.defaultCommentQuestion}</DefRow>}
                  </div>
                ) : (
                  d.selectedQuestions?.length > 0 && (
                    <div style={{ marginTop: 32, marginBottom: "var(--space-5)" }}>
                      <div style={{ font: "500 12px/16px var(--font-sans)", color: "var(--color-fg-secondary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "var(--space-1)" }}>Selected Questions</div>
                      <DefRow label="Questions">
                        <ul style={{ margin: 0, paddingLeft: 18 }}>
                          {d.selectedQuestions.map((q, i) => (
                            <li key={q.uid || i} style={{ marginBottom: 2 }}>{q.text}</li>
                          ))}
                        </ul>
                      </DefRow>
                    </div>
                  )
                )}


              </TemplateConfigGroup>

              {/* 3 — Linked Campaigns */}
              <TemplateConfigGroup title="Linked Campaigns" num={3}>
                {d.isDefault ? (
                  <div style={{
                    display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                    padding: "var(--space-10) var(--space-8)", textAlign: "center",
                    background: "var(--lyra-slate-50)", borderRadius: "var(--radius-md)",
                    border: "1px dashed var(--color-border-soft)"
                  }}>
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="var(--lyra-slate-400)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ marginBottom: 12 }}>
                      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    <p style={{ font: "500 14px/20px var(--font-sans)", color: "var(--color-fg-default)", margin: "0 0 6px" }}>
                      No campaigns linked yet
                    </p>
                    <p style={{ font: "400 13px/18px var(--font-sans)", color: "var(--color-fg-secondary)", margin: 0, maxWidth: 400 }}>
                      Save this template first, then go to a Campaign and select this template to link it. Linked campaigns will appear here automatically.
                    </p>
                  </div>
                ) : linkedCampaigns.length === 0 ? (
                  <div style={{ padding: "var(--space-3) 0", font: "400 14px/20px var(--font-sans)", color: "var(--color-fg-secondary)", fontStyle: "italic" }}>
                    No campaigns are linked to this template.
                  </div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", border: "1px solid var(--color-border-subtle)", borderRadius: "var(--radius-lg)", overflow: "hidden", boxShadow: "var(--shadow-sm)" }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 140px", padding: "var(--space-2) var(--space-5)", background: "var(--lyra-slate-50)", borderBottom: "1px solid var(--color-border-subtle)" }}>
                      {["Campaign", "Status"].map(h => (
                        <span key={h} style={{ font: "500 12px/16px var(--font-sans)", color: "var(--color-fg-secondary)", textTransform: "uppercase", letterSpacing: "0.06em" }}>{h}</span>
                      ))}
                    </div>
                    {linkedCampaigns.map((c, i) => (
                      <div key={c.id} style={{ display: "grid", gridTemplateColumns: "1fr 140px", alignItems: "center", padding: "var(--space-4) var(--space-5)", borderBottom: i < linkedCampaigns.length - 1 ? "1px solid var(--color-border-subtle)" : "none", background: "var(--lyra-white)" }}>
                        <div>
                          <div style={{ font: "500 14px/20px var(--font-sans)", color: "var(--color-fg-default)" }}>{c.name}</div>
                          <div style={{ marginTop: "var(--space-1)" }}><window.CampaignStateInline status={c.status} hasWorkingCopy={c.hasWorkingCopy}/></div>
                        </div>
                        <div><window.StatusPill s={c.status}/></div>
                      </div>
                    ))}
                  </div>
                )}
              </TemplateConfigGroup>

          </div>
        </div>

      </div>{/* /scrollable body */}

      {/* Footer */}
      <div className="wz-footer">
        <button className="btn" onClick={onBack}>← Back</button>
      </div>
    </div>
  );
}

function SurveyDesignsGrid({ onCreate, onOpen, onEdit, newDesigns = [] }) {
  const [search, setSearch] = React.useState("");
  const [typeFilter, setTypeFilter] = React.useState(null);
  const [channelFilter, setChannelFilter] = React.useState(null);
  const [deletedIds, setDeletedIds] = React.useState([]);
  const [sortKey, setSortKey] = React.useState("updated");
  const [sortDir, setSortDir] = React.useState("desc");
  const typeOptions = Array.from(new Set(SEED_DESIGNS.map(d => d.surveyType))).sort();
  const channelOptions = ["Digital", "IVR"];
  const hasAnyFilter = !!search || !!channelFilter;
  const clearAllFilters = () => { setSearch(""); setTypeFilter(null); setChannelFilter(null); };

  function toggleSort(key) {
    if (sortKey === key) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortKey(key); setSortDir("desc"); }
  }

  const SortIcon = ({ k }) => {
    const active = sortKey === k;
    return (
      <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"
        style={{ marginLeft: 4, verticalAlign: "-1px", opacity: active ? 1 : 0.3, color: active ? "var(--color-fg-action)" : "currentColor", flexShrink: 0 }}>
        {(!active || sortDir === "asc")  && <polyline points="4 10 8 6 12 10" style={{ opacity: active && sortDir === "asc" ? 1 : 0.4 }}/>}
        {(!active || sortDir === "desc") && <polyline points="4 6 8 10 12 6"  style={{ opacity: active && sortDir === "desc" ? 1 : 0.4 }}/>}
      </svg>
    );
  };

  const allDesigns = [...newDesigns, ...SEED_DESIGNS];
  const rows = allDesigns.filter(d => {
    if (deletedIds.includes(d.id)) return false;
    if (search && !d.name.toLowerCase().includes(search.toLowerCase())) return false;
    if (typeFilter && d.surveyType !== typeFilter) return false;
    if (channelFilter && d.channel !== channelFilter && d.channel !== "Both") return false;
    return true;
  }).sort((a, b) => {
    // Newly saved designs always float to top (isNew flag), then sort by updated date.
    if (sortDir === "desc") {
      if (a.isNew && !b.isNew) return -1;
      if (!a.isNew && b.isNew) return 1;
    }
    const av = a.updated ?? ""; const bv = b.updated ?? "";
    if (av < bv) return sortDir === "asc" ? -1 : 1;
    if (av > bv) return sortDir === "asc" ? 1 : -1;
    return 0;
  });

  const channelValues = (channel) => {
    if (channel === "Both") return ["Digital", "IVR"];
    return [channel || "Digital"];
  };

  const preChannelRows = allDesigns.filter(d => {
    if (deletedIds.includes(d.id)) return false;
    if (search && !d.name.toLowerCase().includes(search.toLowerCase())) return false;
    if (typeFilter && d.surveyType !== typeFilter) return false;
    return true;
  });
  const channelCounts = channelOptions.reduce((acc, ch) => {
    acc[ch] = preChannelRows.filter(d => channelValues(d.channel).includes(ch)).length;
    return acc;
  }, {});
  const channelFilterOptions = channelOptions.map(ch => ({ value: ch, label: `${ch} (${channelCounts[ch]})` }));

  return (
    <>
    <div className="pane">
      <div className="pane-head">
        <h1 style={{ display: "flex", alignItems: "center", gap: "var(--space-2)" }}>
          Survey Templates
          <span style={{
            display: "inline-flex", alignItems: "center", justifyContent: "center",
            height: 22, minWidth: 22, padding: "0 var(--space-2)",
            borderRadius: "var(--radius-round)",
            background: "var(--lyra-slate-200)", color: "var(--lyra-slate-700)",
            font: "500 12px/16px var(--font-sans)", letterSpacing: "0.01rem",
          }}>{rows.length}</span>
        </h1>
        <div className="head-actions">
          <button className="btn primary" onClick={() => onCreate()}>
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Survey Template
          </button>
        </div>
      </div>

      {/* Lyra filter bar — search on the left + Channel / Type / Owner filter chips */}
      <div className="toolbar">
        <div className="search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input placeholder="Search by name"
            value={search} onChange={e => setSearch(e.target.value)}
            style={search ? { paddingRight: 28 } : {}}/>
          {search && (
            <button onClick={() => setSearch("")} aria-label="Clear search"
              className="search-clear">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          )}
        </div>
        <FilterChip label="Channel" value={channelFilter} options={channelFilterOptions}
          onSelect={setChannelFilter} onClear={() => setChannelFilter(null)}/>
        {hasAnyFilter && (
          <button className="clear-link" onClick={clearAllFilters}>Clear</button>
        )}
      </div>

      <div className="table-wrap">
        <div style={{
          display: "flex", alignItems: "flex-start", gap: "var(--space-2)",
          margin: "0 0 var(--space-4)",
          padding: "var(--space-3) var(--space-4)",
          background: "var(--lyra-color-status-info-subtle)",
          border: "1px solid rgba(45,91,185,0.2)",
          borderRadius: "var(--radius-md)",
          font: "400 14px/20px var(--font-sans)",
          color: "var(--lyra-color-status-info-strong)",
        }}>
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" style={{ flexShrink: 0, marginTop: 2, stroke: "var(--lyra-color-status-info-strong)", fill: "none", strokeWidth: 1.8, strokeLinecap: "round", strokeLinejoin: "round" }}>
            <circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>Reusable templates that define a survey's questions, display style, and delivery rules. Map one template to many campaigns — change the template once and every linked campaign picks it up.</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>Survey template</th>
              <th style={{ width: 200, cursor: "pointer", userSelect: "none" }} onClick={() => toggleSort("updated")}>
                <span style={{ display: "inline-flex", alignItems: "center" }}>Last updated<SortIcon k="updated"/></span>
              </th>
              <th style={{ width: 72, textAlign: "center" }}>Actions</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(d => (
              <tr key={d.id} className={d.isNew ? "new-campaign-row" : ""}>
                <td style={{ maxWidth: 360 }}>
                  <a className="agent-link" href="#" onClick={e => { e.preventDefault(); onOpen(d); }}>
                    {d.name}
                  </a>
                  {/* Lyra Body SM secondary text — Inter Regular 12/16 letter-spacing 0.01rem */}
                  <div style={{
                    fontFamily: "var(--font-sans)",
                    fontSize: 12, fontWeight: 400, lineHeight: "16px", letterSpacing: "0.01rem",
                    color: "var(--color-fg-secondary)",
                    marginTop: 4, whiteSpace: "normal", maxWidth: 340,
                  }}>
                    {d.description}
                  </div>
                </td>
                <td style={{ width: 200 }}>
                  <div>{d.updated || <span style={{ color: "var(--color-fg-secondary)" }}>—</span>}</div>
                  {d.updated && <div style={{ font: "400 12px/16px var(--font-sans)", color: "var(--color-fg-secondary)", marginTop: 4 }}>by {d.owner}</div>}
                </td>
                <td style={{ textAlign: "center", width: 72 }}>
                  <DesignRowActions
                    design={d}
                    onEdit={(design) => onEdit(design)}
                    onDelete={(id) => setDeletedIds(prev => [...prev, id])}
                    deleteDisabled={!!d.isDefault}
                  />
                </td>
              </tr>
            ))}
            {rows.length === 0 ? (
              <tr>
                <td colSpan={3} style={{ padding: "var(--space-6)", textAlign: "center", color: "var(--lyra-slate-400)", font: "400 14px/20px Inter" }}>
                  No templates match the current filter.
                </td>
              </tr>
            ) : null}
          </tbody>
        </table>
      </div>
    </div>
    </>
  );
}

/* Recomputes the legacy single `channel` string ("Digital" | "IVR" | "Both") from */
/* the two independent digitalEnabled/ivrEnabled flags — every read site (badges,  */
/* filters, grid, review rows) keeps working against `d.channel` unchanged.        */
function withDerivedChannel(d) {
  const channel = d.digitalEnabled && d.ivrEnabled ? "Both" : d.ivrEnabled ? "IVR" : "Digital";
  return { ...d, channel };
}

/* Floating "Review Summary" panel — on-demand read-out of every field filled   */
/* in so far, viewable at any scroll position instead of being a dedicated step. */
function ReviewSummaryPanel({ d, linkedIds, currentDesignId, onEditStep, onClose }) {
  const missingRequired = !d.name || (!d.digitalEnabled && !d.ivrEnabled) || (d.aiQuestions && !d.defaultScaleQuestion);

  const SRSection = ({ title, num, children, noEdit }) => (
    <div className="sr-section">
      <div className="sr-section-head">
        <span className="sr-section-num">{num}</span>
        <span className="sr-section-title">{title}</span>
        {!noEdit && (
          <button className="btn btn-ghost" style={{ marginLeft: "auto", font: "var(--text-body-sm)", color: "var(--color-fg-action)" }}
            onClick={() => onEditStep(num - 1)}>
            <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M11 2.5a2 2 0 0 1 2.8 2.8L5 14l-3.5.8.8-3.5z"/></svg>
            Edit
          </button>
        )}
      </div>
      <div className="sr-section-body">{children}</div>
    </div>
  );
  const SRRow = ({ label, children }) => (
    <div className="sr-row">
      <div className="sr-row-label">{label}</div>
      <div className="sr-row-value">{children || <span style={{ color: "var(--color-fg-secondary)" }}>—</span>}</div>
    </div>
  );

  return (
    <div className="tmpl-drawer-overlay" onClick={onClose}>
      <div className="tmpl-drawer" onClick={e => e.stopPropagation()} style={{ width: 480, maxWidth: "94vw" }}>
        <div className="tmpl-drawer-head">
          <div style={{ flex: 1 }}>
            <div style={{ font: "600 20px/24px var(--font-sans)", letterSpacing: "-0.01em", color: "var(--color-fg-default)" }}>Review Summary</div>
            <div style={{ font: "400 12px/20px var(--font-sans)", letterSpacing: "0.01em", color: "var(--color-fg-secondary)", marginTop: 2 }}>
              Everything filled in so far, across all sections.
            </div>
          </div>
          <button className="tmpl-drawer-close" onClick={onClose} aria-label="Close">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div className="tmpl-drawer-body">
          {missingRequired && (

              <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".6" fill="currentColor"/></svg>

          <SRSection title="Identity" num={1}>
            <SRRow label="Template Name">{d.name || <span style={{ color: "var(--color-status-error)" }}>Required</span>}</SRRow>

          <SRSection title="Survey Content" num={2}>

                {d.ivrEnabled && <ChannelBadge channel="IVR"/>}

            </SRRow>
            {d.digitalEnabled && (

                {d.welcomeMode === "with-optout"    ? "Invitation with Opt Out" :
                 d.welcomeMode === "without-optout" ? "Invitation without Opt Out" : "None"}
              </SRRow>
            )}
            {d.digitalEnabled && d.welcomeMode !== "none" && d.welcomeMessage && (
              <SRRow label="Digital Invitation Text">
                <span style={{ display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{d.welcomeMessage}</span>
              </SRRow>
            )}
            {d.ivrEnabled && (
              <SRRow label="IVR Welcome Message">
                {d.ivrWelcomeMode === "with-optout"    ? "Invitation with Opt Out" :
                 d.ivrWelcomeMode === "without-optout" ? "Invitation without Opt Out" : "None"}
              </SRRow>
            )}
            {d.ivrEnabled && d.ivrWelcomeMode !== "none" && d.ivrWelcomeMessage && (
              <SRRow label="IVR Invitation Text">
                <span style={{ display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{d.ivrWelcomeMessage}</span>
              </SRRow>
            )}
            <SRRow label="Questions">{d.aiQuestions ? "AI Generated" : "Standard Questionnaire"}</SRRow>
            {d.aiQuestions ? <>
              {d.digitalEnabled && (
                <SRRow label="Display Style">{d.displayStyle || "Quick Reply"}</SRRow>
              )}
              <SRRow label="Rating Question">{d.defaultScaleQuestion || <span style={{ color: "var(--color-status-error)" }}>Required</span>}</SRRow>
              {d.defaultCommentQuestion && <SRRow label="Follow-up Question">{d.defaultCommentQuestion}</SRRow>}
            </> : (
              d.selectedQuestions?.length > 0 && (
                <SRRow label="Selected Questions">
                  <ul style={{ margin: 0, paddingLeft: 18 }}>
                    {d.selectedQuestions.map((q, i) => (
                      <li key={q.uid || i} style={{ marginBottom: 2 }}>{q.text}</li>
                    ))}
                  </ul>
                </SRRow>
              )
            )}
          </SRSection>

          <SRSection title="Linked Campaigns" num={3} noEdit>
            <div style={{ margin: "0 calc(-1 * var(--space-4)) calc(-1 * var(--space-3))" }}>
              <LinkedCampaignsTable linkedIds={linkedIds} currentDesignId={currentDesignId} />
            </div>
          </SRSection>
        </div>
      </div>
    </div>
  );
}

function CreateSurveyDesign({ onCancel, onSave, initial }) {
  const [d, setD] = React.useState(() => {
    if (!initial) return DEFAULT_DESIGN;
    // Older/seed templates only have a single `channel` string — derive the
    // independent toggles from it so editing them pre-checks the right channel(s).
    if (initial.digitalEnabled !== undefined || initial.ivrEnabled !== undefined) return initial;
    return {
      ...initial,
      digitalEnabled: initial.channel !== "IVR",
      ivrEnabled: initial.channel === "IVR" || initial.channel === "Both",
      ivrWelcomeMode: initial.ivrWelcomeMode ?? DEFAULT_DESIGN.ivrWelcomeMode,
      ivrWelcomeMessage: initial.ivrWelcomeMessage ?? (initial.channel === "IVR" ? initial.welcomeMessage : DEFAULT_DESIGN.ivrWelcomeMessage),
      ivrButtonToStart: initial.ivrButtonToStart ?? (initial.channel === "IVR" ? initial.buttonToStart : DEFAULT_DESIGN.ivrButtonToStart),
      ivrButtonToOptOut: initial.ivrButtonToOptOut ?? (initial.channel === "IVR" ? initial.buttonToOptOut : DEFAULT_DESIGN.ivrButtonToOptOut),
    };
  });
  const set = (k, v) => setD(prev => {
    const next = { ...prev, [k]: v };
    return (k === "digitalEnabled" || k === "ivrEnabled") ? withDerivedChannel(next) : next;
  });
  const isEdit = !!initial;
  const [activeStep, setActiveStep] = React.useState(0);
  const [visitedSteps, setVisitedSteps] = React.useState(new Set([0]));
  const [triedSteps, setTriedSteps] = React.useState(new Set());
  const [saving, setSaving] = React.useState(false);
  const scrollAreaRef = React.useRef(null);
  const sectionRefs = [React.useRef(null), React.useRef(null), React.useRef(null), React.useRef(null)];
  const isClickScrolling = React.useRef(false);
  const [showPreview, setShowPreview] = React.useState(false);
  const [showQuestionPicker, setShowQuestionPicker] = React.useState(false);
  const [showDiscardWarning, setShowDiscardWarning] = React.useState(false);
  const [showFullPreview, setShowFullPreview] = React.useState(false);
  const [showReviewSummary, setShowReviewSummary] = React.useState(false);
  const [questionMode, setQuestionMode] = React.useState(null);
  const [dragIdx, setDragIdx] = React.useState(null);
  const [dragOverIdx, setDragOverIdx] = React.useState(null);
  const [dragBankQ, setDragBankQ] = React.useState(null);
  const [panelDropHover, setPanelDropHover] = React.useState(false);
  const [editQIdx, setEditQIdx] = React.useState(null);
  const [editQDraft, setEditQDraft] = React.useState(null);
  const [channelOpen, setChannelOpen] = React.useState(null);
  const [ivrIntroAudio, setIvrIntroAudio] = React.useState(null);

  React.useEffect(() => {
    if (questionMode !== null) setChannelOpen("digital");
  }, [questionMode]);
  React.useEffect(() => {
    if (d.welcomeMode !== null) setChannelOpen("digital");
  }, [d.welcomeMode]);
  const [ivrAudios, setIvrAudios] = React.useState({});

  function handleSaveTemplate() {
    setSaving(true);
    setTimeout(() => { onSave(d); }, 2500);
  }

  const initialLinkedIds = React.useMemo(() => {
    if (!window.CAMPAIGNS || !initial) return [];
    return window.CAMPAIGNS.filter(c => c.surveyDesignId === initial.id).map(c => c.id);
  }, [initial]);
  const [linkedIds, setLinkedIds] = React.useState(initialLinkedIds);
  const toggleLink = (id) => setLinkedIds(prev =>
    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
  );

  const channelValid = d.digitalEnabled || d.ivrEnabled;
  const questionsValid = !d.aiQuestions || !!d.defaultScaleQuestion;
  const STEPS = [
    { n: 0, label: "Identity",         desc: "Name this template and set ownership so your team knows when to use it.", valid: !!d.name },
    { n: 1, label: "Questions Mode",    desc: "Choose how questions are created for this survey.", valid: true },
    { n: 2, label: "Survey Introduction",   desc: "Optionally greet the customer before the first question starts.", valid: true },
    { n: 3, label: "Channel Configuration", desc: "Configure whichever channels you need. What you configure here becomes available in campaigns.", valid: true },
  ];

  function stepState(s) {
    if (s.n === activeStep) {
      if (triedSteps.has(s.n) && !s.valid) return "error";
      return "active";
    }
    if (triedSteps.has(s.n) && !s.valid) return "error";
    if (visitedSteps.has(s.n) && s.valid) return "done";
    if (visitedSteps.has(s.n) && !s.valid) return "error";
    return "default";
  }

  // Scroll-spy: highlight the stepper node for whichever section is most
  // in view, instead of gating content behind Next/Back.
  React.useEffect(() => {
    const root = scrollAreaRef.current;
    if (!root) return;
    const observer = new IntersectionObserver((entries) => {
      if (isClickScrolling.current) return;
      setVisitedSteps(prev => {
        const next = new Set(prev);
        entries.forEach(entry => { if (entry.isIntersecting) next.add(Number(entry.target.dataset.step)); });
        return next;
      });
      const visible = entries.filter(e => e.isIntersecting);
      if (visible.length === 0) return;
      visible.sort((a, b) => b.intersectionRatio - a.intersectionRatio);
      setActiveStep(Number(visible[0].target.dataset.step));
    }, { root, threshold: [0.1, 0.25, 0.5, 0.75] });
    sectionRefs.forEach(ref => { if (ref.current) observer.observe(ref.current); });
    return () => observer.disconnect();
  }, []);

  function scrollToStep(n) {
    setActiveStep(n);
    setVisitedSteps(prev => new Set([...prev, n]));
    const el = sectionRefs[n].current;
    if (!el) return;
    isClickScrolling.current = true;
    el.scrollIntoView({ behavior: "smooth", block: "start" });
    setTimeout(() => { isClickScrolling.current = false; }, 600);
  }

  const canSave = !!(d.name && channelValid && questionsValid);

  function handleSaveAttempt() {
    setTriedSteps(new Set([0, 1, 2]));
    if (!canSave) {
      const firstInvalid = STEPS.find(s => !s.valid);
      if (firstInvalid) { scrollToStep(firstInvalid.n); return; }
    }
    handleSaveTemplate();
  }

    <div className="pane" style={{ overflow: "hidden" }}>

            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
              <path d="M8 1l6 3.5v7L8 15l-6-3.5v-7L8 1z"/><path d="M8 1v6.5M2 4.5l6 3.5 6-3.5"/>
            </svg>
            Emulator — See how survey looks
          </button>
        </div>
      </div>

      {/* ── Content area: left = scrollable form, right = sticky summary ── */}
      <div className="wz-content-area sv-wz">

        {/* Left: scrollable — all sections stacked, stepper highlights whichever is in view */}
        <div className="wz-content-left">
          <div className="wz-scroll-area" ref={scrollAreaRef}>
            <div className="wz-body">
              <div className="form-pane sv-form">

          {/* ── Step 0: Identity ── */}
          <section ref={sectionRefs[0]} data-step={0} className="wz-section">
            {(()=>{
            const showErr = triedSteps.has(0);
            const nameErr = showErr && !d.name;
            return <div className="wz-step-content">

              <div className="wz-section-header">

              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: "var(--space-5)" }}>

                {/* Template Name */}
                <div className="field-cell">
                  <label className="field-label" style={{ display: "flex", alignItems: "center" }}>
                    Template Name<span className="req">*</span>
                    <span className="char-counter" style={{ marginLeft: "auto" }}>{(d.name || "").length}/50</span>
                  </label>
                  <input type="text" className={`fi-input${nameErr ? " error" : ""}`} placeholder="eg: Post Interaction CSAT" maxLength={50}
                    aria-invalid={nameErr || undefined}
                    value={d.name} onChange={e => set("name", e.target.value)}/>
                  {nameErr && <div className="field-control"><span className="error-msg">
                    <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".6" fill="currentColor"/></svg>

                </div>

                {/* Description */}
                <div className="field-cell">
                  <label className="field-label" style={{ display: "flex", alignItems: "center" }}>

                    <span className="char-counter" style={{ marginLeft: "auto" }}>{(d.description || "").length}/200</span>

                  <textarea className="fi-input" maxLength={200} rows={3}

                    placeholder="What is this template for and which campaign should use it?"
                    value={d.description} onChange={e => set("description", e.target.value)}/>

              </div>
            </div>;
          })()}
          </section>

          {/* ── Step 1: Questions Mode ── */}
          <section ref={sectionRefs[1]} data-step={1} className="wz-section">
          {(()=>{
            const selQs = d.selectedQuestions || [];
            const bankQs = STANDARD_QUESTION_LIBRARY.filter(q => !selQs.some(sq => (sq.libId === q.id || sq.id === q.id)));
            const addQ = (q) => {
              if (selQs.length >= 5) return;

                      </div>

                      {/* ── Section 2: Edit Answer (type-specific) ── */}

                            {/* Scale (1-5 or 0-10) */}

                              const rows = [labels.slice(0, firstRowSize).map((lbl, i) => ({ lbl, i }))];

                                        const scaleNum = editQDraft.type === "0-10 Scale" ? i : i + 1;

                                      <input maxLength={20} className="fi-input"
                                        value={(editQDraft.yesNoLabels || ["Yes", "No"])[i]}

                                          const next = [...(editQDraft.yesNoLabels || ["Yes", "No"])];
                                          next[i] = e.target.value;
                                          setEditQDraft({ ...editQDraft, yesNoLabels: next });
                                        }}
                                      />
                                    </div>
                                  ))}
                                </div>
                              </div>

                            {/* Single Select */}

                                          next[oi] = e.target.value;

                                        }}
                                        style={{ flex: 1, width: "auto" }}
                                      />
                                      <button type="button"
                                        disabled={(editQDraft.singleSelectOptions || []).length <= 2}
                                        onClick={() => setEditQDraft({ ...editQDraft, singleSelectOptions: (editQDraft.singleSelectOptions || []).filter((_, x) => x !== oi) })}
                                        style={{ width: 28, height: 28, display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0, background: "none", border: "1px solid var(--lyra-color-border-soft)", borderRadius: "var(--radius-sm)", cursor: (editQDraft.singleSelectOptions || []).length <= 2 ? "not-allowed" : "pointer", color: (editQDraft.singleSelectOptions || []).length <= 2 ? "var(--lyra-color-fg-disabled)" : "var(--lyra-color-fg-secondary)" }}>
                                        <svg viewBox="0 0 14 14" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><line x1="10.5" y1="3.5" x2="3.5" y2="10.5"/><line x1="3.5" y1="3.5" x2="10.5" y2="10.5"/></svg>
                                      </button>
                                    </div>
                                  ))}
                                  <button type="button"
                                    disabled={(editQDraft.singleSelectOptions || []).length >= 8}
                                    onClick={() => setEditQDraft({ ...editQDraft, singleSelectOptions: [...(editQDraft.singleSelectOptions || []), `Option ${(editQDraft.singleSelectOptions || []).length + 1}`] })}
                                    style={{
                                      display: "inline-flex", alignItems: "center", gap: 6,
                                      background: "none", border: "none", cursor: (editQDraft.singleSelectOptions || []).length >= 8 ? "not-allowed" : "pointer",
                                      font: "500 12px/20px var(--font-sans)", color: (editQDraft.singleSelectOptions || []).length >= 8 ? "var(--lyra-color-fg-disabled)" : "var(--lyra-color-fg-link)",
                                      padding: "4px 0",
                                    }}>
                                    <svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/></svg>
                                    Add Option
                                  </button>
                                </div>
                              </div>
                            )}

                        </div>

                    <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: "var(--space-3)", padding: "var(--space-4) var(--space-6)", borderTop: "1px solid var(--lyra-color-border-subtle)", flexShrink: 0 }}>
                      <button type="button" className="btn"

                      <button type="button" className="btn primary"
                        onClick={() => {
                          const updated = selQs.map((q, i) => i === editQIdx ? editQDraft : q);

                          setEditQIdx(null); setEditQDraft(null);
                        }}>
                        Save
                      </button>
                    </div>

                  </div>
                </div>,
                document.body

                  display: "flex", alignItems: "flex-start", gap: "var(--space-3)",

                  padding: "var(--space-4)",
                }}>
                  <svg viewBox="0 0 16 16" width="18" height="18" fill="none" stroke="var(--lyra-purple-700)" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, marginTop: 1 }}><path d="M8 2l1.06 2.94L12 6l-2.94 1.06L8 10l-1.06-2.94L4 6l2.94-1.06L8 2z"/><path d="M12.5 10l.47 1.3 1.33.5-1.33.47-.47 1.33-.47-1.33-1.33-.47 1.33-.5z"/></svg>

// Persistence shim — uses localStorage. Real backend slots in here later.
const ONTOLOGIES_STORAGE_KEY = "fi-ontologies-v6";
function loadOntologies() {
  try {
    const raw = localStorage.getItem(ONTOLOGIES_STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Merge mappedCampaigns from seed if missing (handles stale localStorage)
      return parsed.map(o => {
        const seed = SEED_ONTOLOGIES.find(s => s.id === o.id);
        if (!seed) return o;
        return {
          ...o,
          mappedCampaigns: (o.mappedCampaigns && o.mappedCampaigns.length > 0) ? o.mappedCampaigns : seed.mappedCampaigns,
          hasUpstreamChanges: seed.hasUpstreamChanges,
        };
      });
    }
  } catch (_) {}
  return SEED_ONTOLOGIES.map(o => ({ ...o, categories: o.categories.map(c => ({ ...c })) }));
}
function saveOntologies(list) {
  try { localStorage.setItem(ONTOLOGIES_STORAGE_KEY, JSON.stringify(list)); } catch (_) {}
}
function formatUpdatedAt(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" }) +
    " · " + d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
}

function VUScoreModel({ onPublishSuccess, ontologies: ontologiesProp, setOntologies: setOntologiesProp }) {
  const [ontologiesLocal, setOntologiesLocal] = React.useState(loadOntologies);
  const ontologies = ontologiesProp !== undefined ? ontologiesProp : ontologiesLocal;
  const setOntologies = setOntologiesProp || setOntologiesLocal;
  // 'list' | 'edit' | 'new'
  const [view, setView] = React.useState("list");
  const [editingId, setEditingId] = React.useState(null);
  const [confirmRemoveId, setConfirmRemoveId] = React.useState(null);
  const [publishedId, setPublishedId] = React.useState(null);
  React.useEffect(() => {
    if (!publishedId) return;
    const t = setTimeout(() => setPublishedId(null), 3000);
    return () => clearTimeout(t);
  }, [publishedId]);

  const editing = editingId ? ontologies.find(o => o.id === editingId) : null;

  const persist = (next) => {
    setOntologies(next);
    saveOntologies(next);
  };
  const handleEdit = (id) => { setEditingId(id); setView("edit"); };
  const handleNew  = () => { setEditingId(null); setView("new"); };
  const handleRemove = (id) => { setConfirmRemoveId(id); };
  const handleConfirmRemove = () => {
    persist(ontologies.filter(o => o.id !== confirmRemoveId));
    setConfirmRemoveId(null);
  };
  const handleCancel = () => { setView("list"); setEditingId(null); };
  const handlePublish = (modelId, categories, refreshDone) => {
    if (!modelId) return;
    const now = new Date().toISOString();
    const model = TOPIC_MODELS.find(m => m.id === modelId);
    const modelName = model ? model.name : modelId;
    // Drop transient flags before persisting
    const clean = categories.map(({ isNew, _originalWeight, _rawInput, ...rest }) => rest);
    let next;
    if (view === "edit" && editing) {
      next = ontologies.map(o =>
        o.id === editing.id
          // Only clear upstream flag if user actually refreshed the model
          ? { ...o, categories: clean, updatedAt: now, updatedBy: "You", hasUpstreamChanges: refreshDone ? false : o.hasUpstreamChanges }
          : o
      );
    } else {
      const existing = ontologies.find(o => o.modelId === modelId);
      if (existing) {
        next = ontologies.map(o =>
          o.id === existing.id
            ? { ...o, modelName, categories: clean, updatedAt: now, updatedBy: "You", hasUpstreamChanges: refreshDone ? false : o.hasUpstreamChanges }
            : o
        );
      } else {
        next = ontologies.concat([{
          id: "ont-" + Date.now(),
          modelId, modelName, categories: clean,
          updatedAt: now, updatedBy: "You",
          hasUpstreamChanges: false,
        }]);
      }
    }
    // Capture the id of the saved ontology before persisting changes the list
    const savedId = (view === "edit" && editing)
      ? editing.id
      : (ontologies.find(o => o.modelId === modelId)?.id || next[next.length - 1]?.id);
    persist(next);
    setView("list");
    setEditingId(null);
    setPublishedId(savedId);
    if (onPublishSuccess) onPublishSuccess(modelName);
  };

  const confirmTarget = confirmRemoveId ? ontologies.find(o => o.id === confirmRemoveId) : null;

  if (view === "list") {
    return (
      <React.Fragment>
        <OntologyList ontologies={ontologies} onEdit={handleEdit} onRemove={handleRemove} onNew={handleNew} publishedId={publishedId}/>
        {confirmRemoveId && (
          <ConfirmModal
            title="Remove ontology configuration"
            body={confirmTarget ? `"${confirmTarget.modelName}" will be permanently removed. This cannot be undone.` : "This configuration will be permanently removed. This cannot be undone."}
            confirmLabel="Remove"
            onConfirm={handleConfirmRemove}
            onCancel={() => setConfirmRemoveId(null)}
          />
        )}
      </React.Fragment>
    );
  }
  return (
    <OntologyEditor
      mode={view}
      ontology={editing}
      configuredModelIds={ontologies.map(o => o.modelId)}
      onCancel={handleCancel}
      onPublish={handlePublish}
    />
  );
}

  // Always show max 10, but keep any "Updates available" rows visible

  const rest = ontologies.filter(o => !o.hasUpstreamChanges).slice().sort((a, b) => {
    const av = a.updatedAt || "";
    const bv = b.updatedAt || "";

    return 0;
  });
  const slots = Math.max(0, 10 - withUpdates.length);
  const display = withUpdates.concat(rest.slice(0, slots)).sort((a, b) => {

      if (av < bv) return sortDir === "asc" ? -1 : 1;
      if (av > bv) return sortDir === "asc" ? 1 : -1;

function CampaignListPopover({ anchor, hidden, onClose }) {
  const popoverRef = React.useRef(null);
  const [pos, setPos] = React.useState({ top: 0, left: 0 });

  /* position: fixed — relative to viewport, no scroll offset needed */
  React.useLayoutEffect(() => {
    if (!anchor) return;
    const r    = anchor.getBoundingClientRect();
    const popW = 320;
    const vw   = window.innerWidth;
    const gap  = 16;
    let left = r.right - popW;                       // right-align to trigger
    if (left < gap) left = gap;                      // clamp left edge
    if (left + popW > vw - gap) left = vw - popW - gap; // clamp right edge
    setPos({ top: r.bottom + 8, left });
  }, [anchor]);

  /* Outside click + Escape */
  React.useEffect(() => {
    function onKey(e) { if (e.key === "Escape") { onClose(); anchor && anchor.focus(); } }
    function onDown(e) {
      if (popoverRef.current && !popoverRef.current.contains(e.target) && anchor && !anchor.contains(e.target))
        onClose();
    }
    document.addEventListener("keydown", onKey);
    document.addEventListener("mousedown", onDown);
    return () => { document.removeEventListener("keydown", onKey); document.removeEventListener("mousedown", onDown); };
  }, [onClose, anchor]);

  return ReactDOM.createPortal(
    <div
      ref={popoverRef}
      role="dialog"
      aria-label={`${hidden.length} additional campaigns`}
      style={{
        position: "fixed",
        top: pos.top, left: pos.left,
        width: 320,
        zIndex: 9999,
        background: "var(--color-bg-surface-overlay)",
        border: "1px solid var(--color-border-soft)",

          {hidden.length} more campaign{hidden.length !== 1 ? "s" : ""}
        </span>
        <button
          onClick={onClose}
          aria-label="Close"
          style={{
            display: "flex", alignItems: "center", justifyContent: "center",
            width: 24, height: 24, borderRadius: "var(--radius-sm)",
            background: "none", border: "none", cursor: "pointer",
            color: "var(--color-fg-secondary)",
          }}
          onMouseEnter={e => e.currentTarget.style.background = "var(--color-state-bg-hover)"}
          onMouseLeave={e => e.currentTarget.style.background = "none"}
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      {/* Campaign rows */}
      <div style={{ maxHeight: 260, overflowY: "auto", padding: "var(--space-1) 0" }}>
        {hidden.map((c, i) => (
          <div key={i} style={{

            color: "var(--color-fg-default)",

          }}>{c}</div>
        ))}
      </div>
    </div>,
    document.body
  );
}

function CampaignList({ campaigns, valueStyle }) {
  const containerRef = React.useRef(null);
  const measureRef   = React.useRef(null);
  const triggerRef   = React.useRef(null);
  const [visibleCount, setVisibleCount] = React.useState(campaigns.length);
  const [popoverOpen, setPopoverOpen]   = React.useState(false);

  /* ── measure & clip ── */
  React.useLayoutEffect(() => {
    if (!containerRef.current || campaigns.length === 0) return;
    function recalc() {
      const container = containerRef.current;
      const measure   = measureRef.current;
      if (!container || !measure) return;
      const availW = container.clientWidth;
      const moreW  = 80;
      let used = 0, count = 0;
      for (let i = 0; i < campaigns.length; i++) {
        measure.textContent = campaigns[i];
        const chipW    = measure.scrollWidth + (i > 0 ? 14 : 0);
        const needMore = i < campaigns.length - 1;
        if (used + chipW + (needMore ? moreW : 0) <= availW) {
          used += chipW;
          count = i + 1;
        } else { break; }
      }
      setVisibleCount(Math.max(1, count));
    }
    recalc();
    const ro = new ResizeObserver(recalc);
    ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, [campaigns]);

  const visible = campaigns.slice(0, visibleCount);
  const hidden  = campaigns.slice(visibleCount);
  const closePopover = React.useCallback(() => setPopoverOpen(false), []);

  return (
    <div ref={containerRef} style={{ display: "flex", alignItems: "center", minWidth: 0, overflow: "hidden", whiteSpace: "nowrap" }}>
      {/* Hidden measurer */}
      <span ref={measureRef} aria-hidden="true" style={{
        position: "absolute", visibility: "hidden", pointerEvents: "none",
        fontFamily: "var(--font-sans)", fontSize: 14, fontWeight: 400, whiteSpace: "nowrap",
      }}/>

      {/* Visible names */}
      <span style={{ ...valueStyle, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", flexShrink: 1 }}>
        {visible.join(", ")}
      </span>

      {/* +N more trigger */}
      {hidden.length > 0 && (
        <>
          <button
            ref={triggerRef}
            aria-haspopup="dialog"
            aria-expanded={popoverOpen}
            onClick={e => { e.stopPropagation(); setPopoverOpen(o => !o); }}
            style={{
              fontFamily: "var(--font-sans)", fontSize: 14, fontWeight: 500, lineHeight: "20px",
              color: "var(--color-fg-link)",
              background: "none", border: "none", padding: 0,
              marginLeft: "var(--space-1)",
              cursor: "pointer", flexShrink: 0, whiteSpace: "nowrap",
              textDecoration: "none",
            }}
            onMouseEnter={e => e.currentTarget.style.textDecoration = "underline"}
            onMouseLeave={e => e.currentTarget.style.textDecoration = "none"}
          >+{hidden.length} more</button>

          {popoverOpen && (
            <CampaignListPopover
              anchor={triggerRef.current}
              hidden={hidden}
              onClose={closePopover}
            />
          )}
        </>
      )}
    </div>
  );
}
